# 📊 Stocks to fetch
symbols:
  - AAPL
  - GOOGL
  - MSFT
  - AMZN
  - META
  - NFLX


# ⚙️ Preprocessing settings
preprocessing:
  moving_average_days: [3, 7, 14]
  rolling_std_days: [3, 7, 14]

# 🤖 ML Training settings
ml_training:
  test_size: 0.2          # used for reference (not used in time split now)
  random_state: 42

# 📈 Evaluation settings
evaluation:
  metrics:
    - MSE
    - R2
    - MAPE
    - Accuracy

# 🧠 Model settings (for future extensibility)
models:
  use:
    - LinearRegression
    - DecisionTree
    - RandomForest
    - ExtraTrees
    - GradientBoosting
    - XGBoost
    - SVR

# 📊 Dashboard settings (future use)
dashboard:
  show_best_model: true
  show_accuracy: true